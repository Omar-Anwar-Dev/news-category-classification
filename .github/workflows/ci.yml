name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install lint + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.4 pytest==8.3.4 nltk==3.9.1

      - name: Cache NLTK corpora
        id: cache-nltk
        uses: actions/cache@v4
        with:
          path: ~/nltk_data
          key: nltk-data-v1

      - name: Download NLTK corpora
        if: steps.cache-nltk.outputs.cache-hit != 'true'
        run: |
          python -c "import nltk; [nltk.download(p, quiet=True) for p in ['punkt', 'punkt_tab', 'stopwords', 'wordnet']]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest -v
